enabled:
  default: true
  type: bool
  description: Enable inline bilibili embeds for supported video URLs.

autoplay_on_click:
  default: true
  type: bool
  description: Add autoplay=1 when the user clicks the cover card.

max_embeds_per_post:
  default: 4
  type: integer
  min: 1
  max: 20
  description: Maximum number of bilibili URLs to enhance in one cooked post.

show_open_link:
  default: true
  type: bool
  description: Show a fallback link to the original bilibili page under the embed.

enable_experimental_live_embed:
  default: true
  type: bool
  description: Inline bilibili live rooms with bilibili's official activity player iframe and control UI. Disable this only if your site or browser environment has compatibility issues.

enable_live_danmaku:
  default: true
  type: bool
  description: When live embeds are enabled, request danmaku in the live H5 player.

auto_open_on_high_risk_env:
  default: true
  type: bool
  description: In high-risk environments such as in-app browsers and WebViews, skip third-party iframe playback and prefer opening bilibili directly.

button_label:
  default: "点击播放"
  type: string
  description: Label shown on the cover button before the iframe is loaded.
